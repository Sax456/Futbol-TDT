
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Panel Admin — TDT Mundial</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

<div class="navbar">
  <div class="navLeft">
    <img src="IMG/logo TDT PERFIL.png" class="logo">
    <h2>TDT Mundial — Admin</h2>
  </div>
  <div class="navRight">
    <span id="usuario"></span>
    <button onclick="logout()" class="btnLogout">Salir</button>
  </div>
</div>

<div class="adminContainer">

  <h1>⚙️ Panel Administrador</h1>

  <!-- AGREGAR PARTIDO -->
  <div class="seccion">
    <button id="btnMostrarForm" class="btn btn-primary" onclick="mostrarFormNuevo()">
      ➕ Agregar partido nuevo
    </button>

    <div id="formNuevo" style="display:none" class="formNuevo">
      <h3>Nuevo partido</h3>
      <div class="formGrid">
        <select id="nuevoGrupo" class="inputAdmin">
          <option value="">-- Selecciona grupo --</option>
          <option value="1">Grupo A</option>
          <option value="2">Grupo B</option>
          <option value="3">Grupo C</option>
          <option value="4">Grupo D</option>
          <option value="5">Grupo E</option>
          <option value="6">Grupo F</option>
          <option value="7">Grupo G</option>
          <option value="8">Grupo H</option>
          <option value="9">Grupo I</option>
          <option value="10">Grupo J</option>
          <option value="11">Grupo K</option>
          <option value="12">Grupo L</option>
        </select>
        <input id="nuevoE1"    class="inputAdmin" placeholder="Equipo 1" />
        <input id="nuevoE2"    class="inputAdmin" placeholder="Equipo 2" />
        <input id="nuevoFecha" class="inputAdmin" type="datetime-local" />
      </div>
      <div class="formBtns">
        <button class="btn btn-primary" onclick="agregarPartido()">💾 Guardar partido</button>
        <button class="btnBack" onclick="cancelarNuevo()">Cancelar</button>
      </div>
    </div>
  </div>

  <!-- FILTRO -->
  <div class="seccion filtroBar">
    <label>Filtrar por grupo:</label>
    <select id="filtroGrupo" onchange="filtrarPartidos()" class="inputAdmin">
      <option value="">Todos los grupos</option>
      <option value="1">Grupo A</option>
      <option value="2">Grupo B</option>
      <option value="3">Grupo C</option>
      <option value="4">Grupo D</option>
      <option value="5">Grupo E</option>
      <option value="6">Grupo F</option>
      <option value="7">Grupo G</option>
      <option value="8">Grupo H</option>
      <option value="9">Grupo I</option>
      <option value="10">Grupo J</option>
      <option value="11">Grupo K</option>
      <option value="12">Grupo L</option>
    </select>
  </div>

  <!-- LISTA DE PARTIDOS -->
  <div class="seccion">
    <h2>📋 Partidos registrados</h2>
    <div id="listaPartidos"></div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/navbar.js"></script>
<script src="js/admin.js"></script>

</body>
</html>
